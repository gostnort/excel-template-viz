# 支持 \t(tab) 等转义字符和其他单字符分隔符
determiner = "\t"
work_sheet = "Input_sheet"
print_sheet = "Print_sheet"
use_independent_db = true

# 外部数据源；路径可为本地文件、网页链接或 Google Sheet
# 首次生成时写入空值 ""，真实路径由专用配置页写入后再落盘
[[sources]]
source1 = 'E:\my_github\excel-template-viz\docs\sample\执法堂业绩.xlsx'

# 输入区段（有且仅有一条）
[[input_section]]
input_area = "A2:G2"
move_to = "down"
offset = 1

# 字段映射：每个模板列一个 [[fields]] 表项
[[fields]]
Input_label = "ID#"
value_from_label = "down"
value_offset = 1
field = "ID"
source_file = "source1"
source_sheet = "sheet1"
index = 0
regex = ""
id = true

[[fields]]
Input_label = "Name"
value_from_label = "down"
value_offset = 1
field = "name"
source_file = "source1"
source_sheet = "sheet1"
index = 1
regex = ""
id = false

[[fields]]
Input_label = "Recent Issue"
value_from_label = "down"
value_offset = 1
field = "issues"
source_file = "source1"
source_sheet = "sheet2"
index = 2
regex = ""
id = false

[[fields]]
Input_label = "Report Date"
value_from_label = "down"
value_offset = 1
field = "issues"
source_file = "source1"
source_sheet = "sheet2"
index = 2
regex = '\d+/\d+/\d+'
id = false

