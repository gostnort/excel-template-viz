determiner: "tab"
order:
  - filed: "?"
    index: -1
YY:
  - filed: "?"
    index: -1
MM:
  - filed: "recv. date"
    index: 12
    regex: '(\d{1,2})(?=\/\d{1,2})'
DD:
  - filed: "recv. date"
    index: 12
    regex: '(?<=\d{1,2}\/)(\d{1,2})'
P.O. No.:
  - ID: true
    filed: "PO"
    index: 0
Container No.:
  - filed: "Container#"
    index: 4
Container Seal No.:
  - filed: "BL#"
    index: 5
Lot No.:
  - filed: "Com. Inv #"
    index: 3
Receiving Date:
  - filed: "recv. date"
    index: 12
    regex: '(\d{1,2}\/\d{1,2})'
Product Description:
  - filed: "?"
    index: -1
Supplier:
  - filed: "?"
    index: -1
Truck Line:
  - filed: "?"
    index: -1
