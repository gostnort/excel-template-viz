# 名片批量打印示例
# 适用场景：员工名片，水平排列
# 布局：每页 2 列 × 5 行 = 10 张名片

determiner: tab
worksheet: "名片"

# 多区域配置：水平排列
sections:
  - input_area: "A1:F10"    # 第一张名片区域（6 列 × 10 行）
    move_to: "right"        # 向右移动
    offset: 8               # 每张名片 6 列 + 2 列空白

# 字段映射
Employee_ID:
  - filed: "员工编号"
    index: 0
    ID: true

Name:
  - filed: "姓名"
    index: 1

Title:
  - filed: "职位"
    index: 2

Department:
  - filed: "部门"
    index: 3

Phone:
  - filed: "电话"
    index: 4
    regex: "\\d{11}"

Email:
  - filed: "邮箱"
    index: 5

Company_Address:
  - filed: "公司地址"
    index: 6

# 显示顺序
order:
  - Employee_ID
  - Name
  - Title
  - Department
  - Phone
  - Email
  - Company_Address
