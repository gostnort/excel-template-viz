# 产品标签批量打印示例
# 适用场景：商品价格标签，一页多个，水平排列
# 布局：每页 4 列 × 6 行 = 24 个标签

determiner: tab
worksheet: "标签"

# 多区域配置：先向下填充一列，再移动到下一列
sections:
  - input_area: "A1:C4"     # 每个标签 3 列 × 4 行
    move_to: "down"         # 先向下排列（填充一列）
    offset: 5               # 每个标签 4 行 + 1 行空白

# 注意：这个配置会自动检测第一列的所有标签位置
# 如果需要横向扩展到其他列，Excel 模板应该包含对应的区域

# 字段映射
Product_ID:
  - filed: "商品编号"
    index: 0
    ID: true

Product_Name:
  - filed: "商品名称"
    index: 1

Price:
  - filed: "价格"
    index: 2
    regex: "\\d+\\.\\d{2}"  # 保留两位小数（例如：99.99）

Barcode:
  - filed: "条形码"
    index: 3

# 显示顺序
order:
  - Product_ID
  - Product_Name
  - Price
  - Barcode
